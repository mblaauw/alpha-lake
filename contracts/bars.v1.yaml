dataset: bars
version: 1
description: Daily OHLCV bars — raw unadjusted open, high, low, close, volume

primary_key:
  - security_id
  - effective_date
  - source_id

partition_key:
  - effective_date

pit_columns:
  valid_time: effective_date
  knowledge_time: available_at

required_fields:
  - security_id
  - effective_date
  - available_at
  - source_id
  - open
  - high
  - low
  - close
  - volume
  - content_hash
  - version_hash
  - quality_status

nullable_fields:
  - source_published_at

market_sanity:
  open: { min: 0 }
  high: { min: 0 }
  low: { min: 0 }
  close: { min: 0 }
  volume: { min: 0 }
  ohlc_consistency: low <= open <= high and low <= close <= high

freshness_sla:
  calendar: exchange
  rule: available_by_next_trading_day

quality_status:
  allowed: [valid, quarantined, stale]

compatibility:
  additive_nullable: compatible
  required_field_change: major
  type_change: major
  pk_change: major

notes:
  - "Raw unadjusted prices only. Adjusted prices are serve-time views, never stored facts."
  - "Price mode (raw/split_adjusted/total_return) is a serve parameter, not part of identity."
  - "Backfills create new available_at versions; they never rewrite prior knowledge."

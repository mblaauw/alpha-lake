dataset: economic_calendar
version: 1
description: Known-future macro events (FOMC, CPI, NFP, GDP, PCE) exposed only when knowable.

primary_key:
  - event_id
  - effective_date
  - source_id

partition_key:
  - effective_date

pit_columns:
  valid_time: effective_date
  knowledge_time: available_at

required_fields:
  - event_id
  - effective_date
  - available_at
  - source_id
  - country
  - content_hash
  - version_hash
  - quality_status

nullable_fields: []

freshness_sla:
  calendar: economic
  rule: within_7_days_of_event

quality_status:
  allowed: [valid]

compatibility:
  additive_nullable: compatible
  required_field_change: major
  type_change: major
  pk_change: major

notes:
  - "Future effective_date rows are only returned when available_at <= as_of."

dataset: fundamentals
version: 1
description: Canonical point-in-time financial statement facts normalized to stable internal line-item names.

primary_key:
  - security_id
  - period_kind
  - period_end
  - statement_type
  - line_item
  - source_id

partition_key:
  - period_end

pit_columns:
  valid_time: effective_date
  knowledge_time: available_at

required_fields:
  - security_id
  - effective_date
  - available_at
  - source_id
  - fiscal_period
  - period_kind
  - period_end
  - measurement_kind
  - statement_type
  - line_item
  - value
  - currency
  - source_currency
  - unit
  - source_fetch_id
  - raw_payload_hash
  - ingestion_run_id
  - content_hash
  - version_hash
  - quality_status

nullable_fields:
  - source_published_at
  - ingested_at
  - validated_at
  - source_priority

allowed_values:
  measurement_kind: [flow, instant]
  period_kind: [quarter, fiscal_year, ttm, mrq]
  statement_type: [income_statement, cash_flow_statement, balance_sheet]

line_items:
  income_statement_flows:
    - revenue
    - cost_of_revenue
    - gross_profit
    - operating_income
    - net_income
    - diluted_eps
    - diluted_weighted_average_shares
    - ebitda
    - depreciation_amortization
    - interest_expense
  cash_flow_statement_flows:
    - operating_cash_flow
    - capital_expenditure
    - dividends_paid
    - share_repurchases
    - share_issuance
    - research_and_development
  balance_sheet_instants:
    - cash_and_equivalents
    - current_assets
    - current_liabilities
    - total_assets
    - total_liabilities
    - total_equity
    - short_term_debt
    - long_term_debt
    - total_debt
    - shares_outstanding
    - preferred_equity
    - minority_interest

source_precedence:
  source: registry
  policy:
    - reported filing fact
    - provider-normalized fact
    - documented derived fallback

freshness_sla:
  calendar: filing
  rule: source_reported_availability

quality_status:
  allowed: [valid, stale, degraded, quarantined]

compatibility:
  additive_nullable: compatible
  required_field_change: major
  type_change: major
  pk_change: major

notes:
  - "Raw filing/provider facts are immutable; corrections and restatements create new available_at versions."
  - "Flow facts and instant facts are never mixed when deriving TTM or MRQ metrics."
  - "Line items use stable snake_case internal names independent of vendor field labels."
  - "Source precedence is registry-driven, not hardcoded in canonicalization."

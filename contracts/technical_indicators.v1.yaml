dataset: technical_indicators
version: 1
description: Neutral indicator library; warm-up values are null not fabricated.

primary_key:
  - security_id
  - effective_date
  - source_id

partition_key:
  - effective_date

pit_columns:
  valid_time: effective_date
  knowledge_time: available_at

required_fields:
  - security_id
  - effective_date
  - available_at
  - source_id
  - content_hash
  - version_hash
  - quality_status

nullable_fields:
  - sma_20
  - sma_50
  - sma_200
  - ema_12
  - ema_26
  - rsi_14
  - bb_upper
  - bb_middle
  - bb_lower
  - atr_14
  - obv
  - vwap
  - macd
  - macd_ema
  - macd_histogram
  - return_1
  - return_5
  - return_21
  - return_63
  - return_126
  - return_252
  - dist_to_ma_20
  - dist_to_ma_50
  - dist_to_ma_200
  - above_ma_20
  - above_ma_50
  - above_ma_200
  - atr_pct
  - realized_vol_21
  - realized_vol_63
  - rvol
  - dollar_volume
  - avg_dollar_volume_20
  - pct_off_52w_high
  - pct_off_52w_low
  - is_new_52w_high
  - is_new_52w_low
  - gap_pct

freshness_sla:
  calendar: exchange
  rule: computed_at_ingest_time

quality_status:
  allowed: [valid, stale]

compatibility:
  additive_nullable: compatible
  required_field_change: major
  type_change: major
  pk_change: major

notes:
  - "New columns are nullable; warm-up periods produce null, not zero."
  - "PIT-bounded: computed only from inputs with available_at <= as_of."

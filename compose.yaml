services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lake_catalog
      POSTGRES_USER: lake
      POSTGRES_PASSWORD: lake
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lake -d lake_catalog"]
      interval: 5s
      timeout: 3s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfsdata:/data
    healthcheck:
      test: ["CMD", "pgrep", "rustfs"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ALPHA_LAKE_CONFIG: /config/stack.toml
      ALPHA_LAKE_EODHD_API_KEY: "${ALPHA_LAKE_EODHD_API_KEY:-}"
      RUSTFS_ACCESS_KEY: "${RUSTFS_ACCESS_KEY:-rustfsadmin}"
      RUSTFS_SECRET_KEY: "${RUSTFS_SECRET_KEY:-rustfsadmin}"
    volumes:
      - ./config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    entrypoint: ["alpha-lake"]

volumes:
  pgdata:
  rustfsdata:

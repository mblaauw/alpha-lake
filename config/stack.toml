[precedence]
analyst_estimates = ["finnhub", "fmp"]
bars_daily = ["tiingo", "yahoo", "eodhd"]
fundamentals = ["tiingo", "alphav"]
insider_tx = ["sec", "finnhub"]
news = ["finnhub", "marketaux", "tiingo"]
sentiment = ["marketaux", "finnhub", "stocktwits"]

[worker]
enabled = true
poll_interval_seconds = 5
stale_after_seconds = 900
allow_rate_limit_raise = false
max_active_runs = 1

[[worker.job_definitions]]
job_name = "stooq.rebuild"
job_type = "stooq_rebuild"
schedule_kind = "manual"
concurrency_key = "stooq"
max_attempts = 3
priority = 50

[[worker.job_definitions]]
job_name = "bars.bootstrap.active"
job_type = "bars_bootstrap"
schedule_kind = "manual"
concurrency_key = "bars"
dataset = "bars"
source_id = "stooq"
max_attempts = 3
priority = 40
params = { symbols = "active", source_id = "stooq", lookback_years = 3 }

[[worker.job_definitions]]
job_name = "bars.refresh.eod"
job_type = "bars_refresh"
schedule_kind = "market_close"
concurrency_key = "bars"
dataset = "bars"
max_attempts = 3
priority = 10
schedule = { calendar = "XNYS", offset_minutes = 30 }
params = { symbols = "active", from_policy = "last_missing_or_previous_session", to_policy = "latest_closed_session" }

[[worker.job_definitions]]
job_name = "indicators.compute.eod"
job_type = "indicators_compute"
schedule_kind = "daily_time"
concurrency_key = "indicators"
dataset = "technical_indicators"
max_attempts = 3
priority = 20
schedule = { timezone = "America/New_York", time = "18:00", calendar = "XNYS", skip_non_trading_days = true }
params = { symbols = "active", trigger = "after_bars_refresh" }

[[worker.job_definitions]]
job_name = "datasets.refresh.core"
job_type = "dataset_refresh"
schedule_kind = "daily_time"
concurrency_key = "datasets"
max_attempts = 3
priority = 30
schedule = { timezone = "America/New_York", time = "06:00" }
params = { datasets = ["earnings_calendar", "insider_tx", "attention_metrics", "news", "sentiment"] }

[[worker.job_definitions]]
job_name = "source.health"
job_type = "source_health"
schedule_kind = "interval"
concurrency_key = "health"
max_attempts = 3
priority = 100
schedule = { interval_seconds = 3600 }

[readouts]
profile_file = "config/threshold_profiles.toml"
benchmark_symbol = "SPY"

[readouts.phases]
phase_1 = ["price_action.*", "trend.*", "momentum.*", "volatility.*", "participation.*", "relative_strength.*", "market_regime.*"]
phase_2 = []
phase_3 = []
phase_4 = []

[transport]
dashboard_enabled = false

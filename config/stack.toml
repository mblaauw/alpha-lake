[lake]
runtime = "stack"
catalog = "ducklake:postgres:dbname=lake_catalog host=postgres port=5432 user=lake password=lake"
canonical_data_path = "s3://lake/"
raw_archive_uri = "s3://lake/raw/"
calendar_version = "4.13.2"
synthetic_mode = false

[s3]
endpoint = "rustfs:9000"
url_style = "path"
use_ssl = false

[quality.bars]
max_staleness_days = 2
halt_on_stale_prices = true

[quality.earnings_calendar]
max_staleness_days = 7

[quality.fundamentals]
max_staleness_days = 30

[quality.insider_tx]
max_staleness_days = 3

[quality.social_posts]
max_staleness_days = 1

[quality.entity_mentions]
max_staleness_days = 1

[quality.news_articles]
max_staleness_days = 1

[quality.sentiment_annotations]
max_staleness_days = 2

[quality.attention_metrics]
max_staleness_days = 1

[quality.security_master]
max_staleness_days = 7

[datasets.lake_bars]
tier = "core"
supported = true
sla = true
description = "PIT daily bars; intraday is planned core expansion."

[datasets.adjusted_bars]
tier = "core"
supported = true
sla = true
description = "Read-time, PIT-bounded adjusted OHLCV series; never materialized."

[datasets.corp_actions]
tier = "core"
supported = true
sla = true
description = "Corporate actions used for PIT-bounded adjustments and source reconciliation."

[datasets.fundamentals]
tier = "core"
supported = true
sla = true
description = "Point-in-time fundamentals; as-reported correctness is the priority."

[datasets.earnings_calendar]
tier = "core"
supported = true
sla = true
description = "Known-future earnings events exposed only when already knowable."

[datasets.insider_tx]
tier = "core"
supported = true
sla = true
description = "SEC insider transaction facts."

[datasets.security_master]
tier = "core"
supported = true
sla = true
description = "PIT security identity resolution and issuer mapping."

[datasets.technical_indicators]
tier = "convenience"
supported = true
sla = false
description = "Neutral indicator library; correctness and warm-up contract over breadth."

[datasets.news_articles]
tier = "experimental"
supported = false
sla = false
description = "Dormant text archive schema; disabled by default pending licensed reliable sources."

[datasets.social_posts]
tier = "experimental"
supported = false
sla = false
description = "Dormant social text schema; disabled by default pending licensed reliable sources."

[datasets.entity_mentions]
tier = "experimental"
supported = false
sla = false
description = "Text-derived analytics schema retained for opt-in future work; no supported implementation."

[datasets.sentiment_annotations]
tier = "experimental"
supported = false
sla = false
description = "Text-derived analytics schema retained for opt-in future work; no supported implementation."

[datasets.attention_metrics]
tier = "experimental"
supported = false
sla = false
description = "Text-derived analytics schema retained for opt-in future work; no supported implementation."

[reconcile.bars]
price_diff_pct = 0.5
volume_diff_pct = 5.0
cross_source_enabled = false

[reconcile.fundamentals]
numeric_diff_pct = 1.0
cross_source_enabled = true

[reconcile.corp_actions]
strict_event_match = true
cross_source_enabled = true

[reconcile.analyst_estimates]
numeric_diff_pct = 1.0
cross_source_enabled = true

[reconcile.news_articles]
cross_source_enabled = true

[reconcile.macro_series]
numeric_diff_pct = 1.0
cross_source_enabled = false


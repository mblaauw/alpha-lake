[lake]
runtime = "stack"
catalog = "ducklake:postgres:dbname=lake_catalog host=postgres port=5432 user=lake password=lake"
canonical_data_path = "s3://lake/"
raw_archive_uri = "s3://lake/raw/"
calendar_version = "4.13.2"

[s3]
endpoint = "rustfs:9000"
url_style = "path"
use_ssl = false

[quality.bars]
max_staleness_days = 2
halt_on_stale_prices = true

[quality.earnings_calendar]
max_staleness_days = 7

[quality.fundamentals]
max_staleness_days = 30

[quality.insider_tx]
max_staleness_days = 3

[quality.social_posts]
max_staleness_days = 1

[quality.entity_mentions]
max_staleness_days = 1

[quality.news_articles]
max_staleness_days = 1

[quality.sentiment_annotations]
max_staleness_days = 2

[quality.attention_metrics]
max_staleness_days = 1

[quality.security_master]
max_staleness_days = 7

[datasets.lake_bars]
tier = "core"
supported = true
sla = true
description = "PIT daily bars; intraday is planned core expansion."

[datasets.adjusted_bars]
tier = "core"
supported = true
sla = true
description = "Read-time, PIT-bounded adjusted OHLCV series; never materialized."

[datasets.corp_actions]
tier = "core"
supported = true
sla = true
description = "Corporate actions used for PIT-bounded adjustments and source reconciliation."

[datasets.fundamentals]
tier = "core"
supported = true
sla = true
description = "Point-in-time fundamentals; as-reported correctness is the priority."

[datasets.earnings_calendar]
tier = "core"
supported = true
sla = true
description = "Known-future earnings events exposed only when already knowable."

[datasets.insider_tx]
tier = "core"
supported = true
sla = true
description = "SEC insider transaction facts."

[datasets.security_master]
tier = "core"
supported = true
sla = true
description = "PIT security identity resolution and issuer mapping."

[datasets.technical_indicators]
tier = "convenience"
supported = true
sla = false
description = "Neutral indicator library; correctness and warm-up contract over breadth."

[datasets.news_articles]
tier = "experimental"
supported = false
sla = false
description = "Dormant text archive schema; disabled by default pending licensed reliable sources."

[datasets.social_posts]
tier = "experimental"
supported = false
sla = false
description = "Dormant social text schema; disabled by default pending licensed reliable sources."

[datasets.entity_mentions]
tier = "experimental"
supported = false
sla = false
description = "Text-derived analytics schema retained for opt-in future work; no supported implementation."

[datasets.sentiment_annotations]
tier = "experimental"
supported = false
sla = false
description = "Text-derived analytics schema retained for opt-in future work; no supported implementation."

[datasets.attention_metrics]
tier = "experimental"
supported = false
sla = false
description = "Text-derived analytics schema retained for opt-in future work; no supported implementation."

[reconcile.bars]
price_diff_pct = 0.5
volume_diff_pct = 5.0
cross_source_enabled = false

[reconcile.fundamentals]
numeric_diff_pct = 1.0
cross_source_enabled = true

[reconcile.corp_actions]
strict_event_match = true
cross_source_enabled = true

[sources.eodhd]
base_url = "https://eodhd.com/api"
rate_limit_per_sec = 10.0
max_retries = 3

[sources.tiingo]
base_url = "https://api.tiingo.com"
rate_limit_per_sec = 5.0
max_retries = 3

[sources.alpaca]
base_url = "https://data.alpaca.markets"
rate_limit_per_sec = 20.0
max_retries = 3

[sources.sec]
base_url = "https://data.sec.gov"
rate_limit_per_sec = 10.0
max_retries = 5

[sources.openfigi]
base_url = "https://api.openfigi.com/v3"
rate_limit_per_sec = 10.0
max_retries = 3

[sources.reddit]
base_url = "https://oauth.reddit.com"
rate_limit_per_sec = 1.0
max_retries = 3

[source_datasets.eodhd]
[source_datasets.eodhd.bars_daily]
enabled = true
parser_version = 1

[source_datasets.eodhd.earnings_calendar]
enabled = true
parser_version = 1

[source_datasets.tiingo]
[source_datasets.tiingo.bars_daily]
enabled = true
parser_version = 1

[source_datasets.tiingo.news_articles]
enabled = false
parser_version = 1


[source_datasets.eodhd.corp_actions]
enabled = true
parser_version = 1

[source_datasets.eodhd.fundamentals]
enabled = true
parser_version = 1

[source_datasets.tiingo.corp_actions]
enabled = true
parser_version = 1

[source_datasets.tiingo.fundamentals]
enabled = true
parser_version = 1

[source_datasets.sec]
[source_datasets.sec.fundamentals]
enabled = true
parser_version = 1
[source_datasets.sec.insider_tx]
enabled = true
parser_version = 1

[source_datasets.reddit]
[source_datasets.reddit.social_posts]
enabled = false
parser_version = 1

[source_datasets.alpaca]
[source_datasets.alpaca.bars_daily]
enabled = false
parser_version = 1

[sources.fred]
base_url = "https://api.stlouisfed.org/fred"
fallback_base_url = "https://fred.stlouisfed.org/graph"
requires_key = false
rate_limit_per_sec = 5.0
rate_limit_per_day = 120000
max_retries = 3

[source_datasets.fred]
[source_datasets.fred.macro_series]
enabled = false
parser_version = 1

[datasets.macro_series]
tier = "experimental"
supported = false
sla = false
description = "Point-in-time macro series; FRED revisions preserved as knowledge-time history."

[quality.macro_series]
max_staleness_days = 45

[precedence]
bars_daily = ["eodhd", "tiingo"]

[lake]
runtime = "stack"
catalog = "ducklake:postgres:dbname=lake_catalog host=postgres port=5432 user=lake password=lake"
canonical_data_path = "s3://lake/"
raw_archive_uri = "s3://lake/raw/"
calendar_version = "4.13.2"

[s3]
endpoint = "rustfs:9000"
url_style = "path"
use_ssl = false

[quality.bars]
max_staleness_days = 2
halt_on_stale_prices = true

[quality.earnings_calendar]
max_staleness_days = 7

[quality.fundamentals]
max_staleness_days = 30

[quality.insider_tx]
max_staleness_days = 3

[quality.social_posts]
max_staleness_days = 1

[quality.entity_mentions]
max_staleness_days = 1

[quality.news_articles]
max_staleness_days = 1

[quality.sentiment_annotations]
max_staleness_days = 2

[quality.attention_metrics]
max_staleness_days = 1

[quality.security_master]
max_staleness_days = 7

[reconcile.bars]
price_diff_pct = 0.5
volume_diff_pct = 5.0
cross_source_enabled = false

[sources.eodhd]
base_url = "https://eodhd.com/api"
rate_limit_per_sec = 10.0
max_retries = 3

[sources.tiingo]
base_url = "https://api.tiingo.com"
rate_limit_per_sec = 5.0
max_retries = 3

[sources.alpaca]
base_url = "https://data.alpaca.markets"
rate_limit_per_sec = 20.0
max_retries = 3

[sources.sec]
base_url = "https://data.sec.gov"
rate_limit_per_sec = 10.0
max_retries = 5

[sources.openfigi]
base_url = "https://api.openfigi.com/v3"
rate_limit_per_sec = 10.0
max_retries = 3

[sources.reddit]
base_url = "https://oauth.reddit.com"
rate_limit_per_sec = 1.0
max_retries = 3

[source_datasets.eodhd]
[source_datasets.eodhd.bars_daily]
enabled = true
parser_version = 1

[source_datasets.eodhd.earnings_calendar]
enabled = true
parser_version = 1

[source_datasets.tiingo]
[source_datasets.tiingo.bars_daily]
enabled = true
parser_version = 1

[source_datasets.tiingo.news_articles]
enabled = true
parser_version = 1


[source_datasets.eodhd.corp_actions]
enabled = true
parser_version = 1

[source_datasets.eodhd.fundamentals]
enabled = true
parser_version = 1

[source_datasets.tiingo.corp_actions]
enabled = true
parser_version = 1

[source_datasets.tiingo.fundamentals]
enabled = true
parser_version = 1

[source_datasets.sec]
[source_datasets.sec.fundamentals]
enabled = true
parser_version = 1
[source_datasets.sec.insider_tx]
enabled = true
parser_version = 1

[source_datasets.reddit]
[source_datasets.reddit.social_posts]
enabled = true
parser_version = 1

[source_datasets.alpaca]
[source_datasets.alpaca.bars_daily]
enabled = false
parser_version = 1

[precedence]
bars_daily = ["eodhd", "tiingo"]

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1
  FORCE_COLOR: 1

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ty check --output-format full
      - run: uv run lint-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -v --ignore=tests/integration/test_mode_parity.py

  stack-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Build app image
        run: docker compose build app

      - name: Start reference stack
        run: docker compose up -d postgres rustfs

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if docker compose exec postgres pg_isready -U lake -d lake_catalog >/dev/null 2>&1 \
               && docker compose exec rustfs pgrep rustfs >/dev/null 2>&1; then
              echo "Services healthy"
              break
            fi
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Bootstrap catalog
        run: docker compose run --rm app bootstrap

      - name: Ingest synthetic data
        run: docker compose run --rm app ingest --security-id sec_test

      - name: Run mode-parity tests against stack
        run: uv run pytest tests/integration/test_mode_parity.py -v
        env:
          AL_CI_PGHOST: localhost
          AL_CI_RUSTFS_HOST: localhost
          RUSTFS_ACCESS_KEY: rustfsadmin
          RUSTFS_SECRET_KEY: rustfsadmin

      - name: Teardown
        if: always()
        run: docker compose down -v

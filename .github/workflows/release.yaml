name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ty check --output-format full
      - run: uv run pytest tests/ -q
      - name: Install just
        run: |
          curl -sL https://github.com/casey/just/releases/download/1.39.0/just-1.39.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          mv just /usr/local/bin/
      - run: just vendor
        shell: bash
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vendor/wheelhouse/requirements.txt
            vendor/images.tar.gz
          generate_release_notes: true

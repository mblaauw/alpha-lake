<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lake Watch</title>
<meta name="description" content="Alpha-Lake data-validation dashboard">
<meta name="theme-color" content="#14110a">
<link rel="stylesheet" href="/static/styles.css">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/static/icons/icon-192.svg">
<link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
</head>
<body>
<div class="lw-page">
  <header class="lw-masthead">
    <div id="lw-syn-banner" style="display:none;align-items:center;justify-content:center;gap:8px;padding:6px 12px;margin-bottom:10px;background:var(--lw-accent-soft);border:1px solid var(--lw-accent);border-radius:6px;font-size:12px;color:var(--lw-ink-2);">
      <span style="font-size:14px;">&#9888;</span>
      <span><strong>DEMO MODE</strong> — data shown is synthetic. Set API keys in <code>.env</code> for live data.</span>
    </div>
    <div class="lw-mast-top">
      <h1 class="lw-wordmark">
        <span class="lw-wordmark-word">LAKE</span><span class="lw-wordmark-word">WATCH</span>
      </h1>
      <div class="lw-settings-wrap">
        <button class="lw-settings-btn" id="lw-settings-btn" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="lw-settings-pop" id="lw-settings-pop">
          <div class="lw-settings-section">
            <div class="lw-settings-label">Theme</div>
            <div class="lw-settings-options">
              <button class="lw-theme-btn" data-theme="dark">Dark</button>
              <button class="lw-theme-btn" data-theme="light">Light</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="lw-mast-date lw-mono" id="lw-header-time"></div>
    <div class="lw-header-controls">
      <select id="lw-price-mode">
        <option value="raw">raw</option>
        <option value="split_adjusted">split</option>
      </select>
      <label>as_of <input type="datetime-local" id="lw-asof" step="1"></label>
      <select id="lw-snapshot"><option value="">live</option></select>
    </div>
  </header>

  <nav id="lw-tabs">
    <div class="lw-tabs" role="tablist">
      <button class="lw-tab is-active" role="tab" data-tab="overview">
        <span class="lw-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Overview
      </button>
      <button class="lw-tab" role="tab" data-tab="bars">
        <span class="lw-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>Bars
      </button>
      <button class="lw-tab" role="tab" data-tab="sentiment">
        <span class="lw-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span>Sentiment
      </button>
      <button class="lw-tab" role="tab" data-tab="indicators">
        <span class="lw-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>Indicators
      </button>
      <button class="lw-tab" role="tab" data-tab="securities">
        <span class="lw-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>Securities
      </button>
      <button class="lw-tab" role="tab" data-tab="pit">
        <span class="lw-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>PIT
      </button>
    </div>
  </nav>

  <main id="lw-content">
    <div class="lw-loading">Loading</div>
  </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>

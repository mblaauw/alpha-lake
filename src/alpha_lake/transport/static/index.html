<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lake Watch</title>
<meta name="description" content="Alpha-Lake data-validation desk">
<meta name="theme-color" content="#FFF1E5">
<!-- Progressive enhancement: degrades to Georgia / system mono offline -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/static/icons/icon-192.svg">
<link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
</head>
<body>
<div class="lw-page">

  <header class="lw-masthead">
    <div class="lw-mast-top">
      <h1 class="lw-wordmark">Lake&#8202;Watch<span class="lw-kicker">Market-data lakehouse · validation desk</span></h1>
      <div class="lw-mast-ctrls">
        <!-- AS OF control (replaces the old price-mode + snapshot dropdowns) -->
        <div class="lw-asof-wrap">
          <button class="lw-asof-btn" id="lw-asof-btn" aria-haspopup="true" aria-expanded="false">
            <span class="lw-asof-state">
              <span class="lw-asof-dot" id="lw-asof-dot"></span>
              <span class="lw-asof-kicker" id="lw-asof-kicker">Live</span>
            </span>
            <span class="lw-asof-val" id="lw-asof-val">Live</span>
            <span class="lw-asof-caret">&#9662;</span>
          </button>
          <div class="lw-asof-pop" id="lw-asof-pop">
            <div class="lw-pop-label">Read the lake as of</div>
            <div class="lw-asof-presets" id="lw-asof-presets"></div>
            <div class="lw-pop-label">Exact instant</div>
            <input type="datetime-local" step="1" class="lw-asof-input" id="lw-asof-input">
            <div class="lw-pop-label" id="lw-snap-label" style="margin-top:11px;display:none;">Snapshots</div>
            <div class="lw-asof-snaps" id="lw-asof-snaps"></div>
            <div class="lw-asof-foot">
              <span class="lw-asof-hint" id="lw-asof-hint">reading live data</span>
              <button class="lw-golive" id="lw-golive">&#8635; Go live</button>
            </div>
          </div>
        </div>
        <button class="lw-theme-btn" id="lw-theme-btn" title="Toggle theme" aria-label="Toggle theme">&#9790;</button>
      </div>
    </div>
    <div class="lw-mast-date lw-mono" id="lw-header-time"></div>
  </header>

  <nav class="lw-nav" id="lw-nav">
    <button class="lw-nav-tab is-active" data-tab="overview">Overview</button>
    <button class="lw-nav-tab" data-tab="bars">Bars</button>
    <button class="lw-nav-tab" data-tab="readouts">Readouts</button>
    <button class="lw-nav-tab" data-tab="sentiment">Sentiment</button>
    <button class="lw-nav-tab" data-tab="indicators">Indicators</button>
    <button class="lw-nav-tab" data-tab="pit">PIT</button>
  </nav>

  <div class="lw-syn-banner" id="lw-syn-banner" style="display:none;">
    <span class="lw-tag">Demo</span>
    <span>Figures are synthetic. Set API keys in <code>.env</code> for live data.</span>
  </div>

  <main id="lw-content"><div class="lw-loading">Loading</div></main>
</div>
<div class="lw-tooltip" id="lw-tooltip"></div>
<script src="/static/app.js"></script>
</body>
</html>

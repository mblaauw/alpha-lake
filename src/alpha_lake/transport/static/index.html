<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lake Watch</title>
<link rel="stylesheet" href="/static/styles.css">
<link rel="manifest" href="/static/manifest.webmanifest">
</head>
<body>
<div id="app">
  <header id="header">
    <h1>Lake Watch</h1>
    <div class="header-controls">
      <label class="as_of-label">
        as_of
        <input type="datetime-local" id="asOfInput" step="1">
      </label>
      <select id="snapshotSelect"><option value="">snapshot — live</option></select>
    </div>
  </header>
  <nav id="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="bars">Bars</button>
    <button class="tab" data-tab="datasets">Datasets</button>
    <button class="tab" data-tab="securities">Securities</button>
    <button class="tab" data-tab="pit">PIT</button>
  </nav>
  <main id="content"></main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
